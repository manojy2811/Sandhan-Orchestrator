apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandhan-orchestrator.fullname" . }}
  labels:
    app: sandhan-orchestrator
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: sandhan-orchestrator
  template:
    metadata:
      labels:
        app: sandhan-orchestrator
    spec:
      containers:
        - name: agent-runtime
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: GOOGLE_API_KEY
              value: "{{ .Values.env.GOOGLE_API_KEY }}"
            - name: TAVILY_API_KEY
              value: "{{ .Values.env.TAVILY_API_KEY }}"
